
on:

  workflow_dispatch:
   inputs:
     environment:
       description: 'select the environment to deploy'
       required: true
       default: 'dev'
       type: choice
       options:
         - dev
         - staging
         - prod

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Deploying to ${{ github.event.inputs.environment }} environment"